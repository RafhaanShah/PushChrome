name: Publish Extension

on:
  release:
    types: [ "published" ]

jobs:
  publish_to_release:
    name: Publish Extension
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Set version variable
      id: vars
      run: echo "tag=${GITHUB_REF#refs/*/}" >> $GITHUB_OUTPUT

    - name: Checkout
      uses: actions/checkout@v6

    - name: Update manifest.json version
      run: |
        jq '.version = "${{ steps.vars.outputs.tag }}"' manifest.json > manifest.tmp && mv manifest.tmp manifest.json

    - name: Commit version changes
      run: |
        git config user.name "GitHub Actions"
        git config user.email "actions@github.com"
        git add manifest.json
        git commit -m "Bump version to ${{ steps.vars.outputs.tag }}"
        git push origin HEAD:main

    - name: Zip extension
      run: npm run zip

    - name: Upload extension zip
      uses: shogo82148/actions-upload-release-asset@v1
      with:
        upload_url: ${{ github.event.release.upload_url }}
        asset_path: PushChrome.zip
        asset_name: PushChrome-${{ steps.vars.outputs.tag }}.zip

    - name: Publish to Chrome Web Store
      uses: mobilefirstllc/cws-publish@2.1.1
      with:
        action: 'publish'
        client_id: ${{ secrets.CHROME_CLIENT_ID }}
        client_secret: ${{ secrets.CHROME_CLIENT_SECRET }}
        refresh_token: ${{ secrets.CHROME_REFRESH_TOKEN }}
        extension_id: ${{ secrets.CHROME_EXTENSION_ID }}
        zip_file: PushChrome.zip
