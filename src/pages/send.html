<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Send Message - Pushover</title>
  <link rel="stylesheet" href="../styles/common.css">
  <link rel="stylesheet" href="send.css">
</head>
<body>
  <div class="container send-container">
    <header class="header">
      <h1>Send Message</h1>
      <div class="header-actions">
        <button id="messages-btn" class="icon-btn hidden" title="Messages">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
            <path d="M0 4a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2V4Zm2-1a1 1 0 0 0-1 1v.217l7 4.2 7-4.2V4a1 1 0 0 0-1-1H2Zm13 2.383-4.708 2.825L15 11.105V5.383Zm-.034 6.876-5.64-3.471L8 9.583l-1.326-.795-5.64 3.47A1 1 0 0 0 2 13h12a1 1 0 0 0 .966-.741ZM1 11.105l4.708-2.897L1 5.383v5.722Z"/>
          </svg>
        </button>
        <button id="settings-btn" class="icon-btn" title="Settings">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
            <path d="M8 4.754a3.246 3.246 0 1 0 0 6.492 3.246 3.246 0 0 0 0-6.492zM5.754 8a2.246 2.246 0 1 1 4.492 0 2.246 2.246 0 0 1-4.492 0z"/>
            <path d="M9.796 1.343c-.527-1.79-3.065-1.79-3.592 0l-.094.319a.873.873 0 0 1-1.255.52l-.292-.16c-1.64-.892-3.433.902-2.54 2.541l.159.292a.873.873 0 0 1-.52 1.255l-.319.094c-1.79.527-1.79 3.065 0 3.592l.319.094a.873.873 0 0 1 .52 1.255l-.16.292c-.892 1.64.901 3.434 2.541 2.54l.292-.159a.873.873 0 0 1 1.255.52l.094.319c.527 1.79 3.065 1.79 3.592 0l.094-.319a.873.873 0 0 1 1.255-.52l.292.16c1.64.892 3.434-.901 2.54-2.541l-.159-.292a.873.873 0 0 1 .52-1.255l.319-.094c1.79-.527 1.79-3.065 0-3.592l-.319-.094a.873.873 0 0 1-.52-1.255l.16-.292c.892-1.64-.902-3.433-2.541-2.54l-.292.159a.873.873 0 0 1-1.255-.52l-.094-.319zm-2.633.283c.246-.835 1.428-.835 1.674 0l.094.319a1.873 1.873 0 0 0 2.693 1.115l.291-.16c.764-.415 1.6.42 1.184 1.185l-.159.292a1.873 1.873 0 0 0 1.116 2.692l.318.094c.835.246.835 1.428 0 1.674l-.319.094a1.873 1.873 0 0 0-1.115 2.693l.16.291c.415.764-.42 1.6-1.185 1.184l-.291-.159a1.873 1.873 0 0 0-2.693 1.116l-.094.318c-.246.835-1.428.835-1.674 0l-.094-.319a1.873 1.873 0 0 0-2.692-1.115l-.292.16c-.764.415-1.6-.42-1.184-1.185l.159-.291A1.873 1.873 0 0 0 1.945 8.93l-.319-.094c-.835-.246-.835-1.428 0-1.674l.319-.094A1.873 1.873 0 0 0 3.06 4.377l-.16-.292c-.415-.764.42-1.6 1.185-1.184l.292.159a1.873 1.873 0 0 0 2.692-1.115l.094-.319z"/>
          </svg>
        </button>
      </div>
    </header>

    <main id="content">
      <!-- Credentials Warning -->
      <div id="credentials-warning" class="warning-banner hidden">
        <p>Send credentials not configured.</p>
        <a href="settings.html">Configure in Settings →</a>
      </div>

      <form id="send-form">
        <!-- Message (required) -->
        <div class="form-group">
          <label for="message">Message <span class="required">*</span></label>
          <textarea 
            id="message" 
            name="message" 
            rows="4" 
            placeholder="Enter your message..."
            required
            maxlength="1024"
          ></textarea>
          <div class="char-count"><span id="message-count">0</span>/1024</div>
        </div>

        <!-- Title (optional) -->
        <div class="form-group">
          <label for="title">Title</label>
          <input 
            type="text" 
            id="title" 
            name="title" 
            placeholder="Optional title"
            maxlength="250"
          >
          <div class="char-count"><span id="title-count">0</span>/250</div>
        </div>

        <!-- Device (optional) -->
        <div class="form-group">
          <label for="device">Device</label>
          <div class="input-with-btn">
            <select id="device" name="device">
              <option value="">All devices</option>
            </select>
            <button type="button" id="refresh-devices-btn" class="icon-btn" title="Refresh device list">
              <span class="refresh-icon">↻</span>
            </button>
          </div>
        </div>

        <!-- Priority -->
        <div class="form-group">
          <label for="priority">Priority</label>
          <select id="priority" name="priority">
            <option value="-2">Lowest (no alert)</option>
            <option value="-1">Low (quiet)</option>
            <option value="0" selected>Normal</option>
            <option value="1">High</option>
            <option value="2">Emergency (requires acknowledgment)</option>
          </select>
        </div>

        <!-- URL (optional) -->
        <div class="form-group">
          <label for="url">URL</label>
          <input 
            type="url" 
            id="url" 
            name="url" 
            placeholder="https://example.com"
            maxlength="512"
          >
          <div class="char-count"><span id="url-count">0</span>/512</div>
        </div>

        <!-- URL Title (optional) -->
        <div class="form-group">
          <label for="url-title">URL Title</label>
          <input 
            type="text" 
            id="url-title" 
            name="urlTitle" 
            placeholder="Link text (optional)"
            maxlength="100"
          >
          <div class="char-count"><span id="url-title-count">0</span>/100</div>
        </div>

        <!-- Sound (optional) -->
        <div class="form-group">
          <label for="sound">Sound</label>
          <select id="sound" name="sound">
            <option value="">Default</option>
            <option value="pushover">Pushover (default)</option>
            <option value="bike">Bike</option>
            <option value="bugle">Bugle</option>
            <option value="cashregister">Cash Register</option>
            <option value="classical">Classical</option>
            <option value="cosmic">Cosmic</option>
            <option value="falling">Falling</option>
            <option value="gamelan">Gamelan</option>
            <option value="incoming">Incoming</option>
            <option value="intermission">Intermission</option>
            <option value="magic">Magic</option>
            <option value="mechanical">Mechanical</option>
            <option value="pianobar">Piano Bar</option>
            <option value="siren">Siren</option>
            <option value="spacealarm">Space Alarm</option>
            <option value="tugboat">Tug Boat</option>
            <option value="alien">Alien Alarm (long)</option>
            <option value="climb">Climb (long)</option>
            <option value="persistent">Persistent (long)</option>
            <option value="echo">Pushover Echo (long)</option>
            <option value="updown">Up Down (long)</option>
            <option value="vibrate">Vibrate Only</option>
            <option value="none">None (silent)</option>
          </select>
        </div>

        <!-- Attachment (optional) -->
        <div class="form-group">
          <label for="attachment">Attachment</label>
          <div class="attachment-input">
            <input 
              type="file" 
              id="attachment" 
              name="attachment" 
              accept="image/*"
              class="hidden"
            >
            <button type="button" id="attachment-btn" class="btn btn-secondary attachment-btn">
              <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor">
                <path d="M4.502 9a1.5 1.5 0 1 0 0-3 1.5 1.5 0 0 0 0 3z"/>
                <path d="M14.002 13a2 2 0 0 1-2 2h-10a2 2 0 0 1-2-2V5A2 2 0 0 1 2 3h10a2 2 0 0 1 2 2v8a1 1 0 0 0-1-1H1a1 1 0 0 0-1 1v8zm-10.002 1-1.5-2-2 2.5h11l-4-5-2 2.5-1.5-2z"/>
              </svg>
              <span>Choose Image</span>
            </button>
            <div id="attachment-preview" class="attachment-preview hidden">
              <img id="attachment-thumb" alt="Preview">
              <div class="attachment-info">
                <span id="attachment-name" class="attachment-name"></span>
                <span id="attachment-size" class="attachment-size"></span>
              </div>
              <button type="button" id="attachment-remove" class="icon-btn attachment-remove" title="Remove attachment">✕</button>
            </div>
          </div>
          <div class="attachment-hint">Images only</div>
        </div>

      </form>
    </main>

    <!-- Sticky Send Section -->
    <div class="send-section">
      <!-- Error Display -->
      <div id="error-message" class="error-banner hidden"></div>

      <!-- Success Display -->
      <div id="success-message" class="success-banner hidden">
        ✓ Message sent successfully!
      </div>

      <button type="submit" form="send-form" id="send-btn" class="btn btn-primary btn-block" disabled>
        <span class="btn-text">Send Message</span>
        <span class="btn-loading hidden">
          <span class="spinner"></span>
        </span>
      </button>
    </div>
  </div>

  <script type="module" src="send.js"></script>
</body>
</html>
