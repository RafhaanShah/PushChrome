<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Settings - Pushover</title>
  <link rel="stylesheet" href="../styles/common.css">
  <link rel="stylesheet" href="settings.css">
</head>
<body>
  <div class="container settings-container">
    <header class="header">
      <h1>Settings</h1>
      <div class="header-actions">
        <button id="messages-btn" class="icon-btn hidden" title="Messages">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
            <path d="M0 4a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2V4Zm2-1a1 1 0 0 0-1 1v.217l7 4.2 7-4.2V4a1 1 0 0 0-1-1H2Zm13 2.383-4.708 2.825L15 11.105V5.383Zm-.034 6.876-5.64-3.471L8 9.583l-1.326-.795-5.64 3.47A1 1 0 0 0 2 13h12a1 1 0 0 0 .966-.741ZM1 11.105l4.708-2.897L1 5.383v5.722Z"/>
          </svg>
        </button>
        <button id="send-btn" class="icon-btn" title="Send message">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
            <path d="M15.964.686a.5.5 0 0 0-.65-.65L.767 5.855H.766l-.452.18a.5.5 0 0 0-.082.887l.41.26.001.002 4.995 3.178 3.178 4.995.002.002.26.41a.5.5 0 0 0 .886-.083l6-15Zm-1.833 1.89L6.637 10.07l-.215-.338a.5.5 0 0 0-.154-.154l-.338-.215 7.494-7.494 1.178-.471-.47 1.178Z"/>
          </svg>
        </button>
      </div>
    </header>

    <main id="content">
      <!-- Account Section -->
      <section class="settings-section">
        <h2>Account</h2>
        <div class="account-info">
          <div class="account-row">
            <span class="account-label">Device</span>
            <span id="device-name" class="account-value">-</span>
          </div>
          <div class="account-row">
            <span class="account-label">User ID</span>
            <span id="user-id" class="account-value">-</span>
          </div>
        </div>
        <button id="logout-btn" class="btn btn-secondary btn-block hidden">
          Logout
        </button>
        <div id="login-prompt" class="hidden">
          <p class="section-hint">Log in to receive messages on this device.</p>
          <button id="login-btn" class="btn btn-primary btn-block">
            Log In
          </button>
        </div>
      </section>

      <!-- Send Message Config Section -->
      <section class="settings-section">
        <h2>Send Message Credentials</h2>
        <p class="section-hint">
          Required to send messages. Get your API token from 
          <a href="https://pushover.net/apps/build" target="_blank" rel="noopener">pushover.net/apps/build</a>
        </p>
        
        <div class="form-group">
          <label for="api-token">API Token</label>
          <input 
            type="text" 
            id="api-token" 
            placeholder="Your application API token"
            maxlength="30"
          >
        </div>

        <div id="user-key-group" class="form-group hidden">
          <label for="user-key">User Key</label>
          <input 
            type="text" 
            id="user-key" 
            placeholder="Your user key"
            maxlength="30"
          >
          <p class="field-hint">
            Get your User Key from <a href="https://pushover.net/" target="_blank" rel="noopener">pushover.net</a>
          </p>
        </div>

        <button id="validate-btn" class="btn btn-secondary">
          <span class="btn-text">Validate Credentials</span>
          <span class="btn-loading hidden">
            <span class="spinner"></span>
          </span>
        </button>
        <div id="validate-result" class="validate-result hidden"></div>
      </section>

      <!-- Preferences Section -->
      <section class="settings-section">
        <h2>Preferences</h2>

        <div id="receive-settings">
          <div class="form-group">
            <label for="refresh-interval">Message Refresh Interval</label>
            <select id="refresh-interval">
              <option value="-1">Instant (WebSocket Streaming)</option>
              <option value="0">Manual only</option>
              <option value="1">Every 1 minute</option>
              <option value="5">Every 5 minutes</option>
              <option value="10">Every 10 minutes</option>
              <option value="15">Every 15 minutes</option>
              <option value="30">Every 30 minutes</option>
            </select>
          </div>

          <div class="form-group">
            <label for="max-messages">Max Messages to Store</label>
            <select id="max-messages">
              <option value="0">None (clear when read)</option>
              <option value="10">10 messages</option>
              <option value="25">25 messages</option>
              <option value="50">50 messages</option>
              <option value="100">100 messages</option>
            </select>
          </div>

          <div class="form-group toggle-group">
            <label for="notifications-enabled">
              <input type="checkbox" id="notifications-enabled">
              <span>Enable desktop notifications</span>
            </label>
          </div>

          <div class="form-group toggle-group">
            <label for="badge-enabled">
              <input type="checkbox" id="badge-enabled">
              <span>Show unread count badge</span>
            </label>
          </div>

          <div class="form-group toggle-group">
            <label for="mark-as-read-on-open">
              <input type="checkbox" id="mark-as-read-on-open">
              <span>Mark messages as read on open</span>
            </label>
          </div>
        </div>

        <div class="form-group">
          <label for="device-refresh-interval">Device List Refresh Interval</label>
          <select id="device-refresh-interval">
            <option value="0">Manual only</option>
            <option value="60">Every 1 hour</option>
            <option value="120">Every 2 hours</option>
            <option value="360">Every 6 hours</option>
            <option value="1440">Every 24 hours</option>
          </select>
        </div>

        <div class="form-group toggle-group">
          <label for="verbose-logging">
            <input type="checkbox" id="verbose-logging">
            <span>Verbose logging (for debugging)</span>
          </label>
        </div>
      </section>

    </main>

    <!-- Sticky Save Button -->
    <div class="save-section">
      <button id="save-btn" class="btn btn-primary btn-block">
        <span class="btn-text">Save Settings</span>
        <span class="btn-loading hidden">
          <span class="spinner"></span>
        </span>
        <span class="btn-success hidden">✓ Saved!</span>
      </button>
    </div>
  </div>

  <script type="module" src="settings.js"></script>
</body>
</html>
